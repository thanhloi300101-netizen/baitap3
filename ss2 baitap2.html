<!DOCTYPE html>
<html>
<head>
  <title>Ví dụ bảng HTML với colspan</title>
</head>
<body>

<h1>Bảng với colspan</h1>

<table border="1">
  <tr>
    <th>Tên</th>
    <th colspan="2">Thông tin</th>
  </tr>
  <tr>
    <td>Nguyễn Văn A</td>
    <td>25 tuổi</td>
    <td>Hà Nội</td>
  </tr>
  <tr>
    <td>Trần Thị B</td>
    <td>30 tuổi</td>
    <td>TP.HCM</td>
  </tr>
</table>

</body>
</html>
